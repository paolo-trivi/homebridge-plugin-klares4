name: Release Publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Source size gate
        run: npm run check:max-lines

      - name: TypeScript strict checks
        run: npx tsc --noEmit --noUnusedLocals --noUnusedParameters

      - name: Test suite
        run: npm test

      - name: Resolve publish metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"

          if [[ "$VERSION" == *"-beta"* ]]; then
            AUTO_TAG="beta"
          elif [[ "$VERSION" == *"-rc"* ]]; then
            AUTO_TAG="rc"
          else
            AUTO_TAG="latest"
          fi

          TAG="$AUTO_TAG"
          GIT_TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$GIT_TAG" != "v$VERSION" ]]; then
            echo "Tag/version mismatch: git tag=$GIT_TAG package.json=$VERSION"
            exit 1
          fi

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Prevent duplicate publish
        shell: bash
        run: |
          set -euo pipefail
          if npm view "${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "Version already published: ${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }}"
            exit 1
          fi

      - name: Publish diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "workflow_ref=$GITHUB_WORKFLOW_REF"
          echo "workflow=$GITHUB_WORKFLOW"
          echo "ref=$GITHUB_REF"
          node -v
          npm -v

      - name: Publish package
        run: npm publish --tag "${{ steps.meta.outputs.tag }}" --access public --provenance

      - name: Summary
        run: |
          echo "Published: ${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "npm tag: ${{ steps.meta.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
