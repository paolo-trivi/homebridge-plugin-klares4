name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Source size gate
        run: npm run check:max-lines

      - name: TypeScript strict checks
        run: npx tsc --noEmit --noUnusedLocals --noUnusedParameters

      - name: Test suite
        run: npm test

      - name: Build package
        run: npm run build

      - name: Upload dist artifact
        if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with:
          name: dist-node20
          path: |
            dist/**
            config.schema.json
            package.json
            README.md
            CHANGELOG.md
          retention-days: 7
